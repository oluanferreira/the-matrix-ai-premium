      - business
      - strategy
      - offers
      - pricing
      - traffic
      - ads
      - budget
      - ROI
      - ROAS
      - growth
      - scale
      - advisory
      - leads
      - sales
      - campanha paga
      - investimento
      - lançamento
      - launch
    path: ".lmas-core/domains/business"
    default: false
    team_bundles:
