      - hamann
      - traffic-manager

  brand:
    name: "Brand & Storytelling"
    description: "Criação de marca — posicionamento, naming, identidade, narrativa, storytelling, movimentos"
    aliases:
      - brand
      - branding
      - marca
      - positioning
      - posicionamento
      - naming
      - identity
      - identidade
      - narrative
      - narrativa
      - storytelling
      - movement
      - movimento
      - community
      - comunidade
      - archetype
